name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Check
        run: bun run check

      - name: Build registry
        run: bun run registry:build

      - name: Verify registry build leaves no git diff
        shell: bash
        run: |
          if [[ -n "$(git status --short --untracked-files=all)" ]]; then
            git status --short --untracked-files=all
            git diff
            exit 1
          fi
